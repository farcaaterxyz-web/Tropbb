<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Viewer & Manager</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); }

        .upload-section {
            border: 2px dashed var(--primary-color);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .upload-section:hover { background: #eef5ff; }

        input[type="file"] { display: none; }

        .custom-file-upload {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
        }

        #item-container {
            margin-top: 20px;
        }

        .json-card {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-all;
        }

        .json-content {
            flex-grow: 1;
            font-family: monospace;
            font-size: 14px;
            margin-right: 15px;
        }

        .actions button {
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
        }

        .copy-btn { background: #28a745; color: white; }
        .delete-btn { background: #dc3545; color: white; }
        .copy-btn:hover { background: #218838; }
        .delete-btn:hover { background: #c82333; }

        .stats { margin-top: 10px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>JSON Viewer & Manager</h2>
    
    <div class="upload-section">
        <label for="file-upload" class="custom-file-upload">
            JSON ফাইল আপলোড করুন
        </label>
        <input id="file-upload" type="file" accept=".json"/>
        <p id="file-name" style="margin-top: 10px;">কোনো ফাইল সিলেক্ট করা হয়নি</p>
    </div>

    <div class="stats" id="stats-info">মোট আইটেম: 0</div>

    <div id="item-container">
        </div>
</div>

<script>
    const fileUpload = document.getElementById('file-upload');
    const fileNameDisplay = document.getElementById('file-name');
    const itemContainer = document.getElementById('item-container');
    const statsInfo = document.getElementById('stats-info');

    fileUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        fileNameDisplay.textContent = `ফাইল: ${file.name}`;
        const reader = new FileReader();

        reader.onload = function(event) {
            try {
                const jsonData = JSON.parse(event.target.result);
                displayJSON(jsonData);
            } catch (error) {
                alert("ভুল JSON ফাইল! অনুগ্রহ করে সঠিক ফাইল আপলোড করুন।");
            }
        };
        reader.readAsText(file);
    });

    function displayJSON(data) {
        itemContainer.innerHTML = '';
        const items = Array.isArray(data) ? data : [data];

        items.forEach((item, index) => {
            const itemString = typeof item === 'object' ? JSON.stringify(item, null, 2) : item;
            createCard(itemString, index);
        });
        updateStats();
    }

    function createCard(content, id) {
        const card = document.createElement('div');
        card.className = 'json-card';
        card.id = `card-${id}`;

        card.innerHTML = `
            <div class="json-content">${content}</div>
            <div class="actions">
                <button class="copy-btn" onclick="copyText(this, \`${content.replace(/`/g, '\\`').replace(/\${/g, '\\${')}\`)">Copy</button>
                <button class="delete-btn" onclick="deleteCard('card-${id}')">Delete</button>
            </div>
        `;
        itemContainer.appendChild(card);
    }

    function copyText(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#0056b3";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#28a745";
            }, 1500);
        });
    }

    function deleteCard(id) {
        const card = document.getElementById(id);
        if (card) {
            card.remove();
            updateStats();
        }
    }

    function updateStats() {
        const count = itemContainer.children.length;
        statsInfo.textContent = `মোট আইটেম: ${count}`;
    }
</script>

</body>
</html>
