<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lutra 1111 Prompt Splitter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f19; color: #f1f5f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; margin: 0; font-size: 24px; }
        .upload-section { background: #161b22; padding: 30px; border-radius: 15px; text-align: center; border: 2px dashed #30363d; margin-bottom: 20px; transition: 0.3s; }
        .upload-section:hover { border-color: #58a6ff; }
        input[type="file"] { background: #21262d; padding: 10px; border-radius: 5px; color: white; cursor: pointer; }
        #promptList { display: flex; flex-direction: column; gap: 15px; }
        .prompt-card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; line-height: 1.6; position: relative; }
        .serial-tag { display: inline-block; background: #238636; color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .prompt-content { font-size: 15px; color: #c9d1d9; white-space: pre-wrap; margin-bottom: 15px; }
        .actions { display: flex; gap: 10px; }
        button { border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .copy-btn { background: #1f6feb; color: white; }
        .copy-btn:hover { background: #388bfd; }
        .delete-btn { background: #da3633; color: white; }
        .delete-btn:hover { background: #f85149; }
        .stats { margin-bottom: 15px; font-size: 14px; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Lutra 1111 Prompt Manager</h1>
        <p>আপনার ফাইলটি আপলোড করুন, এটি নিখুঁতভাবে ১-১১১১টি প্রম্পট আলাদা করে দেবে।</p>
    </div>

    <div class="upload-section">
        <input type="file" id="fileInput" accept=".txt">
        <p>Select your <strong>lutra_1111_prompts.txt</strong> file</p>
    </div>

    <div id="stats" class="stats"></div>
    <div id="promptList"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const promptList = document.getElementById('promptList');
    const statsDiv = document.getElementById('stats');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            
            // এই Regex কোডটি "Hand-drawn mobile art" লেখাটি যেখানেই পাবে সেখান থেকে টেক্সট কেটে আলাদা করবে।
            // এতে ৩-৪টি প্রম্পট একসাথে লেগে থাকার আর কোনো সুযোগ থাকবে না।
            const rawPrompts = content.split(/(?=Hand-drawn mobile art)/g);
            const cleanPrompts = rawPrompts.map(p => p.trim()).filter(p => p.length > 20);
            
            statsDiv.innerHTML = `Total Prompts Found: <strong>${cleanPrompts.length}</strong>`;
            renderPrompts(cleanPrompts);
        };
        reader.readAsText(file);
    });

    function renderPrompts(prompts) {
        promptList.innerHTML = "";
        prompts.forEach((text, index) => {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="serial-tag">Serial: #${index + 1}</div>
                <div class="prompt-content">${text}</div>
                <div class="actions">
                    <button class="copy-btn" onclick="copyPrompt(this, \`${text.replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)">Copy Prompt</button>
                    <button class="delete-btn" onclick="this.closest('.prompt-card').remove()">Delete</button>
                </div>
            `;
            promptList.appendChild(card);
        });
    }

    function copyPrompt(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#238636";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#1f6feb";
            }, 1000);
        });
    }
</script>

</body>
</html>
