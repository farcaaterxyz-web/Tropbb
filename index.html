<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Prompt Manager (Mobile Ready)</title>
    <style>
        :root {
            --primary: #00796b;
            --bg: #f0f4f4;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px; /* মোবাইলের জন্য পারফেক্ট সাইজ */
        }

        h2 { text-align: center; color: var(--primary); font-size: 22px; }
        
        .upload-section {
            border: 2px dashed var(--primary);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            background: #e0f2f1;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #file-input { display: none; }

        .info-bar {
            background: var(--primary);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        .prompt-card {
            background: var(--card-bg);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column; /* মোবাইলের জন্য উপরে-নিচে লেআউট */
            gap: 12px;
            position: relative;
        }

        .serial-number {
            background: var(--primary);
            color: white;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .prompt-text {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            word-wrap: break-word;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #eee;
        }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        button {
            flex: 1; /* মোবাইলে বাটনগুলো সমান বড় হবে */
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .copy-btn { background: #e0f2f1; color: var(--primary); border: 1px solid var(--primary); }
        .copy-btn:active { background: var(--primary); color: white; }
        
        .delete-btn { background: #feebee; color: #c62828; border: 1px solid #c62828; }
        .delete-btn:active { background: #c62828; color: white; }

        /* পিসির জন্য বাটন একটু ছোট করা */
        @media (min-width: 600px) {
            .prompt-card { flex-direction: row; align-items: flex-start; }
            button { flex: none; width: 80px; }
            .serial-number { margin-bottom: 0; margin-right: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Prompt Viewer Pro</h2>

    <div class="upload-section" onclick="document.getElementById('file-input').click()">
        <strong>JSON ফাইল আপলোড করতে এখানে ট্যাপ করুন</strong>
        <input type="file" id="file-input" accept=".json">
    </div>

    <div id="status" class="info-bar" style="display: none;">
        মোট প্রম্পট বাকি: <span id="count">0</span>
    </div>

    <div id="list-container">
        </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const listContainer = document.getElementById('list-container');
    const statusBox = document.getElementById('status');
    const countDisplay = document.getElementById('count');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const json = JSON.parse(event.target.result);
                const dataArray = Array.isArray(json) ? json : (json.nft_prompts || []);
                renderAll(dataArray);
            } catch (err) {
                alert("ভুল ফাইল! সঠিক JSON আপলোড করুন।");
            }
        };
        reader.readAsText(file);
    });

    function renderAll(data) {
        listContainer.innerHTML = '';
        if (data.length > 0) statusBox.style.display = 'block';

        data.forEach((item) => {
            const text = item.prompt || "No prompt text found";
            addCard(text);
        });
        updateInterface();
    }

    function addCard(text) {
        const card = document.createElement('div');
        card.className = 'prompt-card';
        
        card.innerHTML = `
            <div class="serial-number"></div>
            <div class="prompt-text">${text}</div>
            <div class="actions">
                <button class="copy-btn" onclick="copyMe(this, \`${text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">Copy</button>
                <button class="delete-btn" onclick="deleteMe(this)">Delete</button>
            </div>
        `;
        listContainer.appendChild(card);
    }

    function copyMe(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const original = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#00796b";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerText = original;
                btn.style.background = "#e0f2f1";
                btn.style.color = "#00796b";
            }, 1000);
        });
    }

    function deleteMe(btn) {
        const card = btn.closest('.prompt-card');
        card.style.opacity = '0';
        card.style.transform = 'scale(0.9)';
        setTimeout(() => {
            card.remove();
            updateInterface();
        }, 200);
    }

    function updateInterface() {
        const cards = document.querySelectorAll('.prompt-card');
        countDisplay.innerText = cards.length;
        
        // স্মার্ট সিরিয়াল নম্বর আপডেট
        cards.forEach((card, index) => {
            card.querySelector('.serial-number').innerText = index + 1;
        });

        if (cards.length === 0) statusBox.style.display = 'none';
    }
</script>

</body>
</html>
