<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lutra Prompt Organizer</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #334155; margin-bottom: 30px; }
        .header h1 { color: #38bdf8; margin: 0; }
        .upload-box { background: #1e293b; border: 2px dashed #38bdf8; border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 30px; }
        #promptContainer { display: grid; gap: 15px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; position: relative; transition: 0.2s; }
        .card:hover { border-color: #38bdf8; }
        .serial { font-weight: bold; color: #38bdf8; font-size: 1.1em; margin-bottom: 8px; }
        .text { font-size: 14px; line-height: 1.5; color: #cbd5e1; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; }
        button { border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .copy-btn { background: #38bdf8; color: #0f172a; }
        .copy-btn:hover { background: #7dd3fc; }
        .del-btn { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NFT Prompt Organizer (1111 Serial)</h1>
        <p>আপনার টেক্সট ফাইলটি আপলোড করলে এটি অটোমেটিক আলাদা হয়ে যাবে।</p>
    </div>

    <div class="upload-box">
        <input type="file" id="fileInput" accept=".txt">
        <p style="margin-top: 10px; color: #94a3b8;">Select your lutra_1111_prompts.txt file</p>
    </div>

    <div id="promptContainer"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const promptContainer = document.getElementById('promptContainer');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            let content = e.target.result;

            // আপনার প্রম্পটগুলো "Hand-drawn mobile art" দিয়ে শুরু হচ্ছে। 
            // এটি ব্যবহার করে আমরা প্রম্পটগুলো আলাদা করছি।
            const prompts = content.split(/(?=Hand-drawn mobile art)/g).filter(p => p.trim().length > 10);
            
            displayPrompts(prompts);
        };
        reader.readAsText(file);
    });

    function displayPrompts(prompts) {
        promptContainer.innerHTML = "";
        prompts.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="serial">Prompt #${index + 1}</div>
                <div class="text">${p.trim()}</div>
                <div class="btn-group">
                    <button class="copy-btn" onclick="copyText(this, \`${p.trim().replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)">Copy Prompt</button>
                    <button class="del-btn" onclick="this.closest('.card').remove()">Delete</button>
                </div>
            `;
            promptContainer.appendChild(card);
        });
    }

    function copyText(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = "✓ Copied!";
            btn.style.background = "#22c55e";
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.background = "#38bdf8";
            }, 1000);
        });
    }
</script>

</body>
</html>
