<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Manager Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h2 { text-align: center; color: #00ffcc; }
        .upload-section { background: #1e1e1e; padding: 20px; border-radius: 10px; text-align: center; border: 2px dashed #333; margin-bottom: 30px; }
        input[type="file"] { margin-bottom: 15px; }
        #promptList { display: flex; flex-direction: column; gap: 15px; }
        .prompt-card { background: #252525; padding: 20px; border-radius: 8px; border-left: 5px solid #00ffcc; display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .prompt-card:hover { transform: translateX(5px); background: #2a2a2a; }
        .prompt-text { font-size: 14px; line-height: 1.6; margin-bottom: 15px; color: #bbb; }
        .controls { display: flex; gap: 10px; }
        button { cursor: pointer; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .copy-btn { background: #00ffcc; color: #000; }
        .copy-btn:hover { background: #00cca3; }
        .delete-btn { background: #ff4d4d; color: #fff; }
        .delete-btn:hover { background: #cc0000; }
        .serial-number { font-weight: bold; color: #00ffcc; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Prompt Manager (1111 Serializer)</h2>
    
    <div class="upload-section">
        <p>Upload your Prompt Text File (.txt)</p>
        <input type="file" id="fileInput" accept=".txt">
        <p style="font-size: 12px; color: #888;">Note: Each prompt should be on a new line in your file.</p>
    </div>

    <div id="promptList"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const promptList = document.getElementById('promptList');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            // Splitting by new line or common delimiters
            const lines = content.split(/\r?\n/).filter(line => line.trim() !== "");
            renderPrompts(lines);
        };
        reader.readAsText(file);
    });

    function renderPrompts(prompts) {
        promptList.innerHTML = "";
        prompts.forEach((text, index) => {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="serial-number">Prompt #${index + 1}</div>
                <div class="prompt-text">${text}</div>
                <div class="controls">
                    <button class="copy-btn" onclick="copyPrompt(this, \`${text.replace(/`/g, '\\`')}\`)">Copy</button>
                    <button class="delete-btn" onclick="this.parentElement.parentElement.remove()">Delete</button>
                </div>
            `;
            promptList.appendChild(card);
        });
    }

    function copyPrompt(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#fff";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#00ffcc";
            }, 1500);
        });
    }
</script>

</body>
</html>
