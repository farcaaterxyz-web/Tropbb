<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Prompt Manager - 1111 Prompts</title>
    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #f1f5f9;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .upload-area { border: 3px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 10px; background: #fff; margin-bottom: 25px; }
        .prompt-card { 
            background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; position: relative;
        }
        .prompt-text { font-size: 14px; color: #334155; line-height: 1.6; background: #f8fafc; padding: 15px; border-radius: 5px; white-space: pre-wrap; border-left: 4px solid var(--primary); }
        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .copy-btn { background-color: var(--primary); }
        .delete-btn { background-color: var(--danger); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .info { margin-bottom: 15px; font-weight: bold; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">Alien NFT Text Prompt Manager</h2>
    
    <div class="upload-area">
        <p>আপনার <b>.txt</b> ফাইলটি এখানে আপলোড করুন</p>
        <input type="file" id="textFile" accept=".txt">
    </div>

    <div id="info" class="info"></div>
    <div id="displayArea"></div>
</div>

<script>
    const fileInput = document.getElementById('textFile');
    const displayArea = document.getElementById('displayArea');
    const infoDiv = document.getElementById('info');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const content = event.target.result;
            
            // টেক্সট ফাইলকে নম্বর অনুযায়ী ভাগ করার লজিক (১. ২. ৩. ইত্যাদি দেখে ভাগ করবে)
            const promptArray = content.split(/(?=\d+\.\s+)/).filter(item => item.trim().length > 0);
            renderPrompts(promptArray);
        };
        reader.readAsText(file);
    });

    function renderPrompts(prompts) {
        displayArea.innerHTML = '';
        infoDiv.innerText = `মোট ${prompts.length} টি প্রম্পট পাওয়া গেছে।`;

        prompts.forEach((text, index) => {
            const id = index + 1;
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.id = `card-${id}`;

            card.innerHTML = `
                <div class="prompt-text" id="text-${id}">${text.trim()}</div>
                <div class="btn-group">
                    <button class="copy-btn" onclick="copyToClipboard(${id})">Copy (কপি)</button>
                    <button class="delete-btn" onclick="deleteItem(${id})">Delete (ডিলিট)</button>
                </div>
            `;
            displayArea.appendChild(card);
        });
    }

    function copyToClipboard(id) {
        const textToCopy = document.getElementById(`text-${id}`).innerText;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.querySelector(`#card-${id} .copy-btn`);
            const originalText = btn.innerText;
            btn.innerText = "✅ Copied!";
            btn.style.backgroundColor = var(--success);
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "var(--primary)";
            }, 1000);
        }).catch(err => {
            alert("কপি করা সম্ভব হয়নি।");
        });
    }

    function deleteItem(id) {
        const card = document.getElementById(`card-${id}`);
        card.style.display = 'none';
    }
</script>

</body>
</html>
