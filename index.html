<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Prompt Manager with Index</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        
        .upload-box {
            border: 2px dashed #3498db;
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            background: #ebf5fb;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .upload-box:hover { background: #d6eaf8; }
        #file-input { display: none; }

        .prompt-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* নম্বর স্টাইল */
        .index-number {
            background: #3498db;
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }

        .prompt-text {
            font-size: 15px;
            color: #444;
            line-height: 1.5;
            flex-grow: 1;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            gap: 8px;
        }
        
        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        .copy-btn { background: #2ecc71; color: white; }
        .copy-btn:hover { background: #27ae60; }
        .delete-btn { background: #e74c3c; color: white; }
        .delete-btn:hover { background: #c0392b; }
        
        .info-bar {
            margin-bottom: 15px;
            font-weight: bold;
            color: #7f8c8d;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NFT Prompt Manager</h2>

    <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <strong>JSON ফাইল আপলোড করতে এখানে ক্লিক করুন</strong>
        <input type="file" id="file-input" accept=".json">
    </div>

    <div class="info-bar">
        <span id="count">মোট প্রম্পট: 0</span>
    </div>

    <div id="display-area">
        </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const displayArea = document.getElementById('display-area');
    const countDisplay = document.getElementById('count');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const json = JSON.parse(event.target.result);
                // nft_prompts থাকলে সেটি নেবে, নাহলে সরাসরি অ্যারে খুঁজবে
                const dataArray = Array.isArray(json) ? json : (json.nft_prompts || []);
                
                if (dataArray.length > 0) {
                    renderPrompts(dataArray);
                } else {
                    alert("কোনো প্রম্পট খুঁজে পাওয়া যায়নি!");
                }
            } catch (err) {
                alert("ভুল JSON ফাইল!");
            }
        };
        reader.readAsText(file);
    });

    function renderPrompts(data) {
        displayArea.innerHTML = '';
        data.forEach((item, index) => {
            const promptText = item.prompt || "No text available";
            addCard(promptText);
        });
        updateStats();
    }

    function addCard(text) {
        const card = document.createElement('div');
        card.className = 'prompt-card';

        // কার্ডের ভেতর নম্বর, টেক্সট এবং বাটন যোগ করা
        card.innerHTML = `
            <div class="index-number"></div>
            <div class="prompt-text">${text}</div>
            <div class="actions">
                <button class="copy-btn" onclick="copyText(this, \`${text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">Copy</button>
                <button class="delete-btn" onclick="deleteCard(this)">Delete</button>
            </div>
        `;
        displayArea.appendChild(card);
    }

    function copyText(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#34495e";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#2ecc71";
            }, 1000);
        });
    }

    function deleteCard(btn) {
        btn.closest('.prompt-card').remove();
        updateStats(); // ডিলিট করার পর নম্বরগুলো আবার সাজাবে
    }

    function updateStats() {
        const cards = displayArea.querySelectorAll('.prompt-card');
        countDisplay.innerText = `মোট প্রম্পট: ${cards.length}`;
        
        // নম্বরগুলো আপডেট করা
        cards.forEach((card, i) => {
            card.querySelector('.index-number').innerText = i + 1;
        });
    }
</script>

</body>
</html>
