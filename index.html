<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien NFT Prompts Manager - 1111 Prompts</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --danger-color: #ef4444;
            --success-color: #22c55e;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1e293b; margin-bottom: 30px; }
        .prompt-card { 
            display: flex; flex-direction: column; padding: 20px; margin-bottom: 15px; 
            border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; transition: transform 0.2s;
        }
        .prompt-card:hover { transform: translateY(-2px); border-color: var(--primary-color); }
        .prompt-header { font-weight: bold; color: var(--primary-color); margin-bottom: 10px; font-size: 1.1em; }
        .prompt-content { font-size: 14px; color: #475569; line-height: 1.6; background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        .button-group { display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; 
            font-weight: 600; font-size: 14px; transition: 0.3s;
        }
        .copy-btn { background-color: var(--primary-color); color: white; }
        .delete-btn { background-color: var(--danger-color); color: white; }
        button:hover { opacity: 0.9; }
        .status-msg { font-size: 12px; margin-top: 5px; display: none; color: var(--success-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>Alien NFT 1111 Prompts Manager</h1>
    <div id="main-list"></div>
</div>

<script>
    // আপনার ফাইল থেকে প্রম্পটগুলো সিরিয়াল অনুযায়ী রেন্ডার করার ফাংশন
    // ১ থেকে ১১১১ পর্যন্ত লুপ চালিয়ে ডাটা জেনারেট করা হবে
    const totalPrompts = 1111;
    
    // নমুনা ডাটা স্ট্রাকচার (আপনার ফাইলের টেক্সটগুলো এখানে সিরিয়াল অনুযায়ী আসবে)
    const promptBaseText = "Hand‑drawn mobile doodle NFT illustration, black outline only (no white outline), 600x600 background, looks like drawn by hand on a phone, slightly imperfect lines, bright attractive colors, half‑body character, unique alien character, same pose for the whole collection: alien standing straight, body facing forward but head turned slightly to the right looking in one direction, centered composition.";

    function createList() {
        const listContainer = document.getElementById('main-list');
        
        for (let i = 1; i <= totalPrompts; i++) {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.id = `card-${i}`;
            
            // এখানে আপনার ফাইলের আসল ডাটা ম্যাপ করতে হবে
            card.innerHTML = `
                <div class="prompt-header">Prompt #${i}</div>
                <div class="prompt-content" id="prompt-text-${i}">
                    ${i}. ${promptBaseText} (Details for alien #${i} from your file...)
                </div>
                <div class="button-group">
                    <button class="copy-btn" onclick="copyToClipboard(${i})">এক ক্লিকে কপি</button>
                    <button class="delete-btn" onclick="removeItem(${i})">ডিলিট করুন</button>
                </div>
                <div id="status-${i}" class="status-msg">কপি সফল হয়েছে!</div>
            `;
            listContainer.appendChild(card);
        }
    }

    // কপি করার মূল ফাংশন
    async function copyToClipboard(id) {
        const textElement = document.getElementById(`prompt-text-${id}`);
        const textToCopy = textElement.innerText;

        try {
            await navigator.clipboard.writeText(textToCopy);
            
            // সফল হলে ইউজারকে জানানো
            const status = document.getElementById(`status-${id}`);
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 2000);
            
            // বাটন টেক্সট পরিবর্তন
            const btn = document.querySelector(`#card-${id} .copy-btn`);
            btn.innerText = "Copied!";
            btn.style.backgroundColor = "#22c55e";
            setTimeout(() => { 
                btn.innerText = "এক ক্লিকে কপি"; 
                btn.style.backgroundColor = "#4f46e5";
            }, 2000);

        } catch (err) {
            console.error('Copy failed:', err);
            alert('কপি করা সম্ভব হচ্ছে না। দয়া করে ব্রাউজার পারমিশন চেক করুন।');
        }
    }

    // ডিলিট করার ফাংশন
    function removeItem(id) {
        const element = document.getElementById(`card-${id}`);
        if (confirm(`আপনি কি ${id} নম্বর প্রম্পটটি তালিকা থেকে সরাতে চান?`)) {
            element.style.opacity = '0';
            setTimeout(() => {
                element.remove();
            }, 300);
        }
    }

    // পেজ লোড হলে লিস্ট তৈরি হবে
    window.onload = createList;
</script>

</body>
</html>
