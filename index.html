<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Prompt Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        h2 { text-align: center; color: #00796b; }
        
        .upload-box {
            border: 2px dashed #00796b;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            background: #e0f2f1;
            margin-bottom: 20px;
        }
        #file-input { display: none; }

        .prompt-card {
            background: #ffffff;
            border-left: 5px solid #00796b;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prompt-text {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            flex-grow: 1;
            padding-right: 15px;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .copy-btn { background: #00796b; color: white; }
        .delete-btn { background: #e53935; color: white; }
        .copy-btn:hover { background: #004d40; }
        
        .info-bar {
            margin-bottom: 15px;
            font-weight: bold;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NFT Prompt Manager</h2>

    <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <strong>এখানে ক্লিক করে আপনার JSON ফাইলটি আপলোড করুন</strong>
        <input type="file" id="file-input" accept=".json">
    </div>

    <div class="info-bar">
        <span id="count">মোট প্রম্পট: 0</span>
    </div>

    <div id="display-area">
        </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const displayArea = document.getElementById('display-area');
    const countDisplay = document.getElementById('count');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const json = JSON.parse(event.target.result);
                
                // আপনার স্ক্রিনশট অনুযায়ী 'nft_prompts' কি বা সরাসরি অ্যারে চেক করা
                const dataArray = Array.isArray(json) ? json : json.nft_prompts;
                
                if (dataArray) {
                    renderPrompts(dataArray);
                } else {
                    alert("সঠিক ফরম্যাটে ডাটা খুঁজে পাওয়া যায়নি!");
                }
            } catch (err) {
                alert("JSON ফাইলটি পড়তে সমস্যা হচ্ছে।");
            }
        };
        reader.readAsText(file);
    });

    function renderPrompts(data) {
        displayArea.innerHTML = '';
        data.forEach((item, index) => {
            // শুধুমাত্র 'prompt' ফিল্ডটি নেওয়া হচ্ছে
            const promptText = item.prompt || "No prompt found";
            createCard(promptText, index);
        });
        updateCount();
    }

    function createCard(text, id) {
        const card = document.createElement('div');
        card.className = 'prompt-card';
        card.id = `card-${id}`;

        card.innerHTML = `
            <div class="prompt-text">${text}</div>
            <div class="actions">
                <button class="copy-btn" onclick="copyText(this, \`${text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">Copy</button>
                <button class="delete-btn" onclick="deleteCard('card-${id}')">Delete</button>
            </div>
        `;
        displayArea.appendChild(card);
    }

    function copyText(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 1000);
        });
    }

    function deleteCard(id) {
        document.getElementById(id).remove();
        updateCount();
    }

    function updateCount() {
        countDisplay.innerText = `মোট প্রম্পট: ${displayArea.children.length}`;
    }
</script>

</body>
</html>
