<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Prompt Manager</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        .input-section { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; resize: vertical; box-sizing: border-box; }
        .process-btn { background-color: #1a73e8; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; font-weight: bold; }
        .prompt-item { display: flex; flex-direction: column; background: #fafafa; margin-bottom: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid #1a73e8; }
        .prompt-text { font-size: 14px; color: #333; margin-bottom: 12px; white-space: pre-wrap; line-height: 1.5; }
        .actions { display: flex; gap: 10px; }
        button { padding: 8px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .copy-btn { background-color: #34a853; color: white; }
        .delete-btn { background-color: #ea4335; color: white; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <h2>প্রম্পট ম্যানেজার</h2>
    
    <div class="input-section">
        <p><strong>১. নিচে আপনার সকল প্রম্পট (১-১১১১) পেস্ট করুন:</strong></p>
        <textarea id="rawInput" placeholder="এখানে আপনার ফাইল থেকে সব টেক্সট কপি করে পেস্ট করুন..."></textarea>
        <button class="process-btn" onclick="processText()">লিস্ট তৈরি করুন</button>
    </div>

    <div id="promptList"></div>
</div>

<script>
    function processText() {
        const input = document.getElementById('rawInput').value;
        const listContainer = document.getElementById('promptList');
        listContainer.innerHTML = ''; // আগের লিস্ট ক্লিয়ার করা

        if (!input.trim()) {
            alert("অনুগ্রহ করে টেক্সট পেস্ট করুন!");
            return;
        }

        // প্রম্পটগুলোকে সিরিয়াল নম্বর অনুযায়ী ভাগ করা (যেমন: 1., 2. ইত্যাদি)
        const items = input.split(/(?=\d+\.\s+)/);

        items.forEach((item, index) => {
            if (item.trim()) {
                const cleanItem = item.trim();
                const div = document.createElement('div');
                div.className = 'prompt-item';
                div.id = `item-${index}`;
                
                div.innerHTML = `
                    <div class="prompt-text" id="text-${index}">${cleanItem}</div>
                    <div class="actions">
                        <button class="copy-btn" onclick="copyText(${index})">কপি করুন</button>
                        <button class="delete-btn" onclick="deleteItem(${index})">ডিলিট</button>
                    </div>
                `;
                listContainer.appendChild(div);
            }
        });
        alert("মোট " + items.length + " টি প্রম্পট লোড হয়েছে।");
    }

    function copyText(id) {
        const text = document.getElementById(`text-${id}`).innerText;
        
        // আধুনিক কপি মেথড
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            const btn = document.querySelector(`#item-${id} .copy-btn`);
            btn.innerText = "Copied!";
            btn.style.backgroundColor = "#2b8a3e";
            setTimeout(() => {
                btn.innerText = "কপি করুন";
                btn.style.backgroundColor = "#34a853";
            }, 1500);
        } catch (err) {
            alert('কপি করা সম্ভব হচ্ছে না');
        }
        document.body.removeChild(textArea);
    }

    function deleteItem(id) {
        const element = document.getElementById(`item-${id}`);
        element.style.opacity = '0.3';
        setTimeout(() => {
            element.remove();
        }, 200);
    }
</script>

</body>
</html>
